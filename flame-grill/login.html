<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Login - Flame Grill</title>
    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;500;600;700;800;900&family=Playfair+Display:ital,wght@0,700;1,700&display=swap" rel="stylesheet">
    <!-- FontAwesome for Icons -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="styles.css">
    <style>
        .login-section {
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            background-color: var(--dark-main);
            padding: 2rem;
        }

        .login-card {
            background-color: var(--dark-card);
            padding: 3rem;
            border-radius: 12px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.5);
            max-width: 400px;
            width: 100%;
            text-align: center;
        }

        .login-card .logo {
            font-size: 2rem;
            margin-bottom: 2rem;
            display: inline-block;
        }

        .form-group {
            margin-bottom: 1.5rem;
            text-align: left;
        }

        .error-message {
            color: var(--primary-color);
            margin-bottom: 1rem;
            font-size: 0.9rem;
            display: none;
        }
    </style>
</head>
<body>

    <section class="login-section">
        <div class="login-card">
            <a href="/" class="logo">
                <i class="fa-solid fa-fire-flame-curved"></i>
                Flame <span>Grill</span>
            </a>
            <div class="section-header align-left" style="margin-bottom: 1rem;">
                <h2 style="font-size: 1.5rem;">Admin Access</h2>
            </div>
            
            <div id="error-msg" class="error-message">Invalid password. Please try again.</div>

            <form id="login-form">
                <div class="form-group">
                    <input type="password" id="password" placeholder="Enter Admin Password" required>
                </div>
                <button type="submit" class="btn btn-primary w-100">Login <i class="fa-solid fa-arrow-right"></i></button>
            </form>
            <p style="margin-top: 1.5rem; font-size: 0.8rem;"><a href="/" style="color: var(--light-text); text-decoration: none;"><i class="fa-solid fa-arrow-left"></i> Back to Home</a></p>
        </div>
    </section>

    <script>
        document.getElementById('login-form').addEventListener('submit', async (e) => {
            e.preventDefault();
            const password = document.getElementById('password').value;
            const errorMsg = document.getElementById('error-msg');
            const submitBtn = document.querySelector('button[type="submit"]');

            const originalText = submitBtn.innerHTML;
            submitBtn.innerHTML = '<i class="fa-solid fa-spinner fa-spin"></i> Authenticating...';
            submitBtn.disabled = true;

            try {
                const response = await fetch('/api/login', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ password })
                });

                const data = await response.json();

                if (response.ok && data.success) {
                    window.location.href = '/admin.html';
                } else {
                    errorMsg.style.display = 'block';
                    errorMsg.textContent = data.message || 'Authentication failed';
                    submitBtn.innerHTML = originalText;
                    submitBtn.disabled = false;
                }
            } catch (err) {
                console.error(err);
                errorMsg.style.display = 'block';
                errorMsg.textContent = 'Server error. Try again later.';
                submitBtn.innerHTML = originalText;
                submitBtn.disabled = false;
            }
        });
    </script>
</body>
</html>
